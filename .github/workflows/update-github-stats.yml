name: Update GitHub Stats Cache

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Fetch GitHub Stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: node scripts/fetch-github-stats.mjs

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/lib/data/github-stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update github stats cache [skip ci]" && git push)
